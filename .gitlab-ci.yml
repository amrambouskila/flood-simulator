stages:
  - lint
  - test
  - build
  - docker-build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.13"

.python-base:
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --upgrade pip
    - pip install ruff pytest pytest-cov pytest-asyncio
    - pip install -r requirements.txt

lint:
  extends: .python-base
  stage: lint
  script:
    - ruff check .
    - ruff format --check .
  cache:
    key: pip-cache
    paths:
      - .pip-cache/

test:
  extends: .python-base
  stage: test
  script:
    - pytest --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=100
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  cache:
    key: pip-cache
    paths:
      - .pip-cache/

build:
  extends: .python-base
  stage: build
  script:
    - python -m py_compile models.py
    - python -m py_compile app.py
    - python -m py_compile simulation.py
    - python -m py_compile visualization.py
    - python -m py_compile fac14_main.py
  cache:
    key: pip-cache
    paths:
      - .pip-cache/

docker-build:
  stage: docker-build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t fac14-simulator:test .
  rules:
    - changes:
        - Dockerfile
        - requirements.txt
        - "*.py"